<!DOCTYPE html>
<html>
<head>
    <title>Démonstration - Interface de Mapping Business Central</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-select {
            font-size: 0.95rem;
        }
        .form-label strong {
            color: #2c3e50;
        }
        .text-muted {
            font-size: 0.85rem;
        }
        .card-header h5, .card-header h6 {
            color: #495057;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-md-11">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-exchange-alt me-2"></i>Démonstration - Interface de Mapping Business Central
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-success">
                            <i class="fas fa-check-circle me-2"></i>
                            <strong>Interface fonctionnelle!</strong> Voici les listes déroulantes demandées avec les champs Business Central.
                        </div>
                        
                        <form>
                            <!-- Section Clients -->
                            <div class="card mb-4">
                                <div class="card-header bg-light">
                                    <h5 class="mb-0"><i class="fas fa-users me-2"></i>Mapping des Clients</h5>
                                </div>
                                <div class="card-body">
                                    <div class="row">
                                        <!-- Code Client -->
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">
                                                <strong>Code Client FinovRelance</strong> <span class="text-danger">*</span>
                                                <small class="text-muted d-block">Identifiant unique du client</small>
                                            </label>
                                            <select class="form-select" name="client_code" required>
                                                <option value="">-- Sélectionnez un champ --</option>
                                                <option value="No" selected>No - Numéro client</option>
                                                <option value="Name">Name - Nom principal</option>
                                                <option value="gsClientCode">gsClientCode - Code client personnalisé</option>
                                                <option value="Customer_Posting_Group">Customer_Posting_Group - Groupe comptabilisation</option>
                                            </select>
                                        </div>
                                        
                                        <!-- Nom Client -->
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">
                                                <strong>Nom Client FinovRelance</strong> <span class="text-danger">*</span>
                                                <small class="text-muted d-block">Nom ou raison sociale</small>
                                            </label>
                                            <select class="form-select" name="client_name" required>
                                                <option value="">-- Sélectionnez un champ --</option>
                                                <option value="Name" selected>Name - Nom principal</option>
                                                <option value="Name_2">Name_2 - Nom secondaire</option>
                                                <option value="Search_Name">Search_Name - Nom de recherche</option>
                                                <option value="No">No - Numéro client</option>
                                            </select>
                                        </div>
                                        
                                        <!-- Email -->
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">
                                                <strong>Email FinovRelance</strong>
                                                <small class="text-muted d-block">Adresse email principale</small>
                                            </label>
                                            <select class="form-select" name="client_email">
                                                <option value="">-- Aucun (optionnel) --</option>
                                                <option value="E_Mail" selected>E_Mail - Adresse email</option>
                                                <option value="Primary_Contact_No">Primary_Contact_No - Contact principal</option>
                                                <option value="Contact">Contact - Contact général</option>
                                            </select>
                                        </div>
                                        
                                        <!-- Téléphone -->
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">
                                                <strong>Téléphone FinovRelance</strong>
                                                <small class="text-muted d-block">Numéro de téléphone principal</small>
                                            </label>
                                            <select class="form-select" name="client_phone">
                                                <option value="">-- Aucun (optionnel) --</option>
                                                <option value="Phone_No" selected>Phone_No - Téléphone principal</option>
                                                <option value="MobilePhoneNo">MobilePhoneNo - Téléphone mobile</option>
                                                <option value="Fax_No">Fax_No - Numéro de fax</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Section Factures -->
                            <div class="card mb-4">
                                <div class="card-header bg-light">
                                    <h5 class="mb-0"><i class="fas fa-file-invoice me-2"></i>Mapping des Factures</h5>
                                </div>
                                <div class="card-body">
                                    <div class="row">
                                        <!-- Code Client (dans la facture) -->
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">
                                                <strong>Référence Client dans Facture</strong> <span class="text-danger">*</span>
                                                <small class="text-muted d-block">Lien vers le client dans la facture</small>
                                            </label>
                                            <select class="form-select" name="invoice_customer_code" required>
                                                <option value="">-- Sélectionnez un champ --</option>
                                                <option value="Sell_to_Customer_No" selected>Sell_to_Customer_No - Client vendeur</option>
                                                <option value="Bill_to_Customer_No">Bill_to_Customer_No - Client facturé</option>
                                                <option value="Ship_to_Code">Ship_to_Code - Code expédition</option>
                                            </select>
                                        </div>
                                        
                                        <!-- Numéro Facture -->
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">
                                                <strong>Numéro de Facture</strong> <span class="text-danger">*</span>
                                                <small class="text-muted d-block">Identifiant unique de la facture</small>
                                            </label>
                                            <select class="form-select" name="invoice_number" required>
                                                <option value="">-- Sélectionnez un champ --</option>
                                                <option value="No" selected>No - Numéro facture</option>
                                                <option value="External_Document_No">External_Document_No - N° document externe</option>
                                                <option value="Your_Reference">Your_Reference - Votre référence</option>
                                            </select>
                                        </div>
                                        
                                        <!-- Montant Total -->
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">
                                                <strong>Montant Total de la Facture</strong> <span class="text-danger">*</span>
                                                <small class="text-muted d-block">Montant TTC de la facture</small>
                                            </label>
                                            <select class="form-select" name="invoice_amount" required>
                                                <option value="">-- Sélectionnez un champ --</option>
                                                <option value="Amount_Including_VAT" selected>Amount_Including_VAT - Montant TTC</option>
                                                <option value="Amount">Amount - Montant HT</option>
                                                <option value="Outstanding_Amount">Outstanding_Amount - Montant dû</option>
                                            </select>
                                        </div>
                                        
                                        <!-- Date d'échéance -->
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">
                                                <strong>Date d'Échéance</strong> <span class="text-danger">*</span>
                                                <small class="text-muted d-block">Date limite de paiement</small>
                                            </label>
                                            <select class="form-select" name="invoice_due_date" required>
                                                <option value="">-- Sélectionnez un champ --</option>
                                                <option value="Due_Date" selected>Due_Date - Date échéance</option>
                                                <option value="Document_Date">Document_Date - Date document</option>
                                                <option value="Posting_Date">Posting_Date - Date comptabilisation</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Boutons d'action -->
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-success btn-lg">
                                    <i class="fas fa-check me-2"></i>Interface Fonctionnelle !
                                </button>
                                <button type="button" class="btn btn-primary btn-lg">
                                    <i class="fas fa-save me-2"></i>Enregistrer le Mapping
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
