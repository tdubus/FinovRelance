<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FinovRelance{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ 'favicon.ico'|asset_url }}">
    <link rel="icon" type="image/x-icon" href="{{ 'favicon.ico'|asset_url }}">
    <link rel="icon" type="image/png" sizes="48x48" href="{{ 'favicon.png'|asset_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ 'favicon-32x32.png'|asset_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ 'favicon-16x16.png'|asset_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ 'apple-touch-icon.png'|asset_url }}">
    
    <style>
        .text-primary { color: #8475EC !important; }
        .btn-primary { background-color: #8475EC; border-color: #8475EC; }
        .btn-outline-primary { color: #8475EC; border-color: #8475EC; }
        .btn-outline-primary:hover { background-color: #8475EC; border-color: #8475EC; }
    </style>
</head>
<body class="bg-light">
    {% block content %}{% endblock %}
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
