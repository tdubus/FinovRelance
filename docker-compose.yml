version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://finovrelance:localdevpassword@db:5432/finovrelance
      - DEV_BYPASS_2FA_EMAIL=dev@finovrelance.dev
    # Bind-mount static + templates + security/views so most edits hit the
    # container immediately (Flask debug reloader picks up Python changes).
    # Python source dirs are mounted READ-ONLY so a compromise of the running
    # debug server cannot persist malicious code back to the host. Static and
    # templates stay RW since user uploads (logos) need write access.
    volumes:
      - ./static:/app/static
      - ./templates:/app/templates
      - ./marketing_site:/app/marketing_site
      - ./security:/app/security:ro
      - ./views:/app/views:ro
      - ./utils:/app/utils:ro
    # debug flag honors FLASK_DEBUG env var (1 = on). Lets a prod-ish compose
    # override unset FLASK_DEBUG without having to rewrite the entrypoint.
    entrypoint: ["python", "-c", "import os; from app import app; app.run(host='0.0.0.0', port=5000, debug=os.environ.get('FLASK_DEBUG','0')=='1')"]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: finovrelance
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: finovrelance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finovrelance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
