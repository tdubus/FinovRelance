version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - FLASK_ENV=development
      - REDIS_URL=redis://redis:6379/0
    entrypoint: ["python", "-c", "from app import app; app.run(host='0.0.0.0', port=5000, debug=True)"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: finovrelance
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: finovrelance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finovrelance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
